services:
  dev:
    image: devc_debian:0.1
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    volumes:
      - ..:/workspace:cached                 # código do projeto (raiz)
    command: sleep infinity